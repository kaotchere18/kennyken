<!DOCTYPE html>
<html>
<head>
    <title>Car Price Predictor</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }
        .container {
            margin-top: 50px;
            padding: 20px;
            background: white;
            width: 400px;
            margin-left: auto;
            margin-right: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }
        input, select {
            width: 90%;
            padding: 8px;
            margin: 8px;
        }
        button {
            padding: 10px 20px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: darkblue;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Car Price Prediction</h2>

    <form action="/predict" method="post">

        <input type="number" name="year" placeholder="Year" required>

        <input type="number" step="0.01" name="present_price" placeholder="Present Price" required>

        <input type="number" name="kms_driven" placeholder="Kilometers Driven" required>

        <select name="fuel_type">
            <option value="Petrol">Petrol</option>
            <option value="Diesel">Diesel</option>
        </select>

        <select name="seller_type">
            <option value="Dealer">Dealer</option>
            <option value="Individual">Individual</option>
        </select>

        <select name="transmission">
            <option value="Manual">Manual</option>
            <option value="Automatic">Automatic</option>
        </select>

        <input type="number" name="owner" placeholder="Number of Owners" required>

        <br><br>
        <button type="submit">Predict</button>
    </form>

    <h3>{{ prediction_text }}</h3>
</div>

</body>
</html>
